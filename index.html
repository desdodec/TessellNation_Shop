<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessellnation | Contact Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #f2e8db;
            color: #0f1720;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: rgba(255,255,255,.5);
            border: 1px solid #d6d6d6;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(15,23,32,.12);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #0f1720;
            letter-spacing: -0.025em;
        }
        p {
            color: #54758a;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 25px 0;
        }
        .btn {
            display: block;
            background-color: #e16a4a;
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(225,106,74,.25);
        }
        .btn:hover {
            background-color: #c95638;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="tessellNation_logo_new.svg" alt="TessellNation" style="display:block;width:100%;height:180px;object-fit:contain;transform:scale(2.4);margin:0 auto 10px">
        <p>Click the button below to save my contact details directly to your phone's address book.</p>
        
        <!-- This links directly to your vcard file -->
        <a href="tessell.vcf" class="btn" download>Save Contact</a>
    </div>

</body>
</html>
